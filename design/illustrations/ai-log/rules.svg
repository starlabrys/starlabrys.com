<svg width="1700" height="630" viewBox="0 0 1700 630" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect width="1700" height="630" fill="#0e1618"/>
  <text x="32" y="44" font-size="15" fill="#7a8b8e">Reports</text>
  <text x="120" y="44" font-size="15" font-weight="700" fill="#e8eef0">Rules</text>
  <line x1="120" y1="52" x2="176" y2="52" stroke="#0f6e6a" stroke-width="2"/>

  <g font-size="13" fill="#c9d4d6">
    <rect x="32" y="70" width="90" height="32" rx="16" fill="#0f6e6a"/><text x="52" y="91" fill="#fff">All (5)</text>
    <rect x="132" y="70" width="90" height="32" rx="16" fill="rgba(255,255,255,0.06)"/><text x="152" y="91">Manual</text>
    <rect x="232" y="70" width="110" height="32" rx="16" fill="rgba(255,255,255,0.06)"/><text x="252" y="91">AI learned</text>
  </g>

  <rect x="32" y="118" width="620" height="34" rx="6" fill="#182225" stroke="rgba(255,255,255,0.1)"/>
  <text x="48" y="140" font-size="12" fill="#7a8b8e">Search rules (ID, pattern, summary)…</text>
  <rect x="668" y="118" width="160" height="34" rx="6" fill="#182225" stroke="rgba(255,255,255,0.1)"/>
  <text x="682" y="140" font-size="12" fill="#c9d4d6">All categories</text>
  <rect x="844" y="118" width="150" height="34" rx="6" fill="#182225" stroke="rgba(255,255,255,0.1)"/>
  <text x="858" y="140" font-size="12" fill="#c9d4d6">All sources</text>
  <rect x="1560" y="118" width="100" height="34" rx="6" fill="#0f6e6a"/>
  <text x="1584" y="140" font-size="12" fill="#fff" font-weight="700">Refresh</text>

  <rect x="32" y="176" width="1636" height="34" fill="#182225"/>
  <g font-size="11" font-weight="700" fill="#9fb0b3">
    <text x="48" y="198">RULE ID</text>
    <text x="240" y="198">CATEGORY</text>
    <text x="360" y="198">SEVERITY</text>
    <text x="460" y="198">SUMMARY</text>
    <text x="800" y="198">SOURCE</text>
    <text x="960" y="198">GENERATED</text>
    <text x="1100" y="198">ACTIONS</text>
  </g>

  <g font-size="13" fill="#e8eef0">
    <text x="48" y="240" fill="#5fb8d6">RULE_NULL_CONTEXT</text>
    <rect x="240" y="224" width="90" height="22" rx="4" fill="rgba(255,255,255,0.08)"/><text x="252" y="240" font-size="11" fill="#c9d4d6">NullRef</text>
    <circle cx="366" cy="235" r="4" fill="#e07a6d"/><text x="378" y="240" font-size="12">critical</text>
    <text x="460" y="240" font-size="12">Context is null before process()</text>
    <rect x="800" y="224" width="90" height="22" rx="11" fill="rgba(197,228,225,0.18)"/><text x="812" y="240" font-size="11" fill="#c5e4e1">AI learned</text>
    <text x="960" y="240" font-size="12" fill="#9fb0b3">2 days ago</text>
    <text x="1100" y="240" font-size="12" fill="#5fb8d6">View</text><text x="1150" y="240" font-size="12" fill="#5fd68f">Promote</text><text x="1224" y="240" font-size="12" fill="#e07a6d">Delete</text>

    <text x="48" y="288" fill="#5fb8d6">RULE_AUTH_TIMEOUT</text>
    <rect x="240" y="272" width="90" height="22" rx="4" fill="rgba(255,255,255,0.08)"/><text x="252" y="288" font-size="11" fill="#c9d4d6">Timeout</text>
    <circle cx="366" cy="283" r="4" fill="#e2a53a"/><text x="378" y="288" font-size="12">high</text>
    <text x="460" y="288" font-size="12">Upstream timeout cascading to gateway</text>
    <rect x="800" y="272" width="72" height="22" rx="11" fill="rgba(255,255,255,0.08)"/><text x="812" y="288" font-size="11" fill="#c9d4d6">Manual</text>
    <text x="960" y="288" font-size="12" fill="#9fb0b3">5 weeks ago</text>
    <text x="1100" y="288" font-size="12" fill="#5fb8d6">View</text>

    <text x="48" y="336" fill="#5fb8d6">RULE_CONN_REFUSED</text>
    <rect x="240" y="320" width="100" height="22" rx="4" fill="rgba(255,255,255,0.08)"/><text x="252" y="336" font-size="11" fill="#c9d4d6">Connection</text>
    <circle cx="366" cy="331" r="4" fill="#e07a6d"/><text x="378" y="336" font-size="12">critical</text>
    <text x="460" y="336" font-size="12">Database connection refused during peak</text>
    <rect x="800" y="320" width="72" height="22" rx="11" fill="rgba(255,255,255,0.08)"/><text x="812" y="336" font-size="11" fill="#c9d4d6">Manual</text>
    <text x="960" y="336" font-size="12" fill="#9fb0b3">7 weeks ago</text>
    <text x="1100" y="336" font-size="12" fill="#5fb8d6">View</text>

    <text x="48" y="384" fill="#5fb8d6">RULE_WORKER_OOM</text>
    <rect x="240" y="368" width="70" height="22" rx="4" fill="rgba(255,255,255,0.08)"/><text x="252" y="384" font-size="11" fill="#c9d4d6">OOM</text>
    <circle cx="366" cy="379" r="4" fill="#e2a53a"/><text x="378" y="384" font-size="12">high</text>
    <text x="460" y="384" font-size="12">Worker heap OOM on batch job</text>
    <rect x="800" y="368" width="90" height="22" rx="11" fill="rgba(197,228,225,0.18)"/><text x="812" y="384" font-size="11" fill="#c5e4e1">AI learned</text>
    <text x="960" y="384" font-size="12" fill="#9fb0b3">3 days ago</text>
    <text x="1100" y="384" font-size="12" fill="#5fb8d6">View</text><text x="1150" y="384" font-size="12" fill="#5fd68f">Promote</text><text x="1224" y="384" font-size="12" fill="#e07a6d">Delete</text>

    <text x="48" y="432" fill="#5fb8d6">RULE_RATE_LIMIT_WARN</text>
    <rect x="240" y="416" width="90" height="22" rx="4" fill="rgba(255,255,255,0.08)"/><text x="252" y="432" font-size="11" fill="#c9d4d6">RateLimit</text>
    <circle cx="366" cy="427" r="4" fill="#3fae6a"/><text x="378" y="432" font-size="12">low</text>
    <text x="460" y="432" font-size="12">Soft rate-limit warnings on auth endpoints</text>
    <rect x="800" y="416" width="72" height="22" rx="11" fill="rgba(255,255,255,0.08)"/><text x="812" y="432" font-size="11" fill="#c9d4d6">Manual</text>
    <text x="960" y="432" font-size="12" fill="#9fb0b3">3 months ago</text>
    <text x="1100" y="432" font-size="12" fill="#5fb8d6">View</text>
  </g>
  <g stroke="rgba(255,255,255,0.08)">
    <line x1="32" y1="256" x2="1668" y2="256"/>
    <line x1="32" y1="304" x2="1668" y2="304"/>
    <line x1="32" y1="352" x2="1668" y2="352"/>
    <line x1="32" y1="400" x2="1668" y2="400"/>
  </g>
</svg>
